<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EduAVA · Professor</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --p1:#4f46e5;--p2:#7c3aed;--grad:linear-gradient(135deg,var(--p1),var(--p2));
  --dark:#1e1b4b;--dark2:#2d2a6e;--sidebar-w:260px;
  --text:#1f2937;--muted:#6b7280;--border:#e5e7eb;--bg:#f5f3ff;--white:#fff;
  --green:#059669;--red:#dc2626;--amber:#d97706;
  --radius:14px;--card-shadow:0 4px 20px rgba(79,70,229,.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);background:var(--dark);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.08);}
.sidebar-logo h1{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;color:#fff;display:flex;align-items:center;gap:10px;}
.sidebar-logo span{font-size:13px;color:rgba(255,255,255,.5);font-weight:400;display:block;margin-top:2px;}
.user-card{margin:16px;background:rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;}
.user-card .uname{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:#fff;}
.user-card .urole{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px;}
.sidebar-section{padding:8px 16px;font-size:10px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-transform:uppercase;margin-top:8px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.65);font-size:14px;font-weight:500;border-radius:0;position:relative;}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
.nav-item.active{background:var(--grad);color:#fff;font-weight:600;}
.nav-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:#fff;border-radius:0 4px 4px 0;}
.nav-item .nav-icon{font-size:18px;width:22px;text-align:center;flex-shrink:0;}
.nav-turma-item{padding:9px 20px 9px 52px;font-size:13px;color:rgba(255,255,255,.55);cursor:pointer;transition:all .2s;}
.nav-turma-item:hover{color:#fff;background:rgba(255,255,255,.05);}
.nav-turma-item.active{color:var(--p1);font-weight:600;}
.sidebar-bottom{margin-top:auto;padding:16px;}
.btn-logout{width:100%;padding:11px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.btn-logout:hover{background:rgba(220,38,38,.3);color:#fff;}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--white);padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar h2{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--dark);}
.topbar-actions{display:flex;gap:10px;}
.content{flex:1;overflow-y:auto;padding:28px;}

/* ── Cards ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:22px;box-shadow:var(--card-shadow);display:flex;align-items:center;gap:16px;}
.stat-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.stat-icon.blue{background:#eef2ff;} .stat-icon.green{background:#f0fdf4;} .stat-icon.amber{background:#fffbeb;} .stat-icon.purple{background:#faf5ff;}
.stat-info .num{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--dark);}
.stat-info .lbl{font-size:13px;color:var(--muted);margin-top:2px;}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-header h3{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;color:var(--dark);}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;font-family:'Outfit',sans-serif;}
.btn-primary{background:var(--grad);color:#fff;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(79,70,229,.3);}
.btn-sm{padding:7px 14px;font-size:13px;}
.btn-outline{background:transparent;border:2px solid var(--p1);color:var(--p1);}
.btn-outline:hover{background:var(--p1);color:#fff;}
.btn-danger{background:transparent;border:2px solid var(--red);color:var(--red);}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-ghost{background:rgba(79,70,229,.08);color:var(--p1);}
.btn-success{background:var(--green);color:#fff;}

/* ── List cards ── */
.list-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--card-shadow);overflow:hidden;margin-bottom:16px;}
.list-card-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.list-card-header h3{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;}
.list-item{padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;transition:background .15s;}
.list-item:last-child{border-bottom:none;}
.list-item:hover{background:#fafafa;}
.list-item-icon{width:40px;height:40px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.list-item-info{flex:1;min-width:0;}
.list-item-info .title{font-weight:700;font-size:15px;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-item-info .sub{font-size:13px;color:var(--muted);margin-top:2px;}
.list-item-actions{display:flex;gap:8px;flex-shrink:0;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.badge-green{background:#dcfce7;color:var(--green);}
.badge-amber{background:#fef3c7;color:var(--amber);}
.badge-gray{background:#f3f4f6;color:var(--muted);}
.badge-blue{background:#eef2ff;color:var(--p1);}

/* ── Turma card ── */
.turma-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--card-shadow);padding:22px;display:flex;flex-direction:column;gap:12px;cursor:pointer;transition:all .2s;border:2px solid transparent;}
.turma-card:hover{border-color:var(--p1);transform:translateY(-3px);}
.turma-card h3{font-family:'Outfit',sans-serif;font-size:18px;font-weight:700;}
.turma-card .turma-meta{display:flex;gap:12px;font-size:13px;color:var(--muted);}
.turma-card .turma-code{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:var(--p1);background:#eef2ff;padding:4px 10px;border-radius:20px;letter-spacing:1px;}
.turma-card .turma-actions{display:flex;gap:8px;margin-top:4px;}

/* ── Form popup ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.popup-box{background:var(--white);border-radius:20px;padding:32px;width:90%;max-width:520px;max-height:90vh;overflow-y:auto;animation:popIn .25s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.popup-box h2{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;color:var(--dark);margin-bottom:24px;}
.form-field{margin-bottom:16px;}
.form-field label{display:block;font-weight:700;font-size:13px;color:var(--text);margin-bottom:6px;}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-size:15px;font-family:'Lato',sans-serif;color:var(--text);outline:none;transition:border-color .2s;}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--p1);}
.popup-actions{display:flex;gap:10px;margin-top:20px;}
.popup-actions .btn{flex:1;justify-content:center;}

/* ── Builder integration ── */
#builderPanel{display:none;flex-direction:column;height:100%;}
#builderPanel.active{display:flex;}
.builder-toolbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.builder-meta{padding:16px 20px;background:var(--white);border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;}
.builder-meta input,.builder-meta select{padding:9px 14px;border:2px solid var(--border);border-radius:8px;font-size:14px;outline:none;}
.builder-meta input:focus,.builder-meta select:focus{border-color:var(--p1);}
.builder-canvas{flex:1;overflow-y:auto;padding:32px;background:var(--bg);}
.builder-editor{background:var(--white);border-radius:var(--radius);padding:40px;min-height:500px;box-shadow:var(--card-shadow);}
#visualizacao{font-family:'Georgia',serif;font-size:18px;line-height:1.8;color:#333;min-height:200px;outline:none;}
#visualizacao:empty::before{content:'Clique aqui e use os botões acima para adicionar conteúdo...';color:#ccc;font-style:italic;}

/* Builder element styles */
#visualizacao h1{position:relative;text-align:center;color:#fff;font-size:36px;font-weight:bold;display:flex;align-items:center;justify-content:center;min-height:180px;padding:30px;background:var(--grad);border-radius:12px;margin:0 0 30px;text-shadow:2px 2px 8px rgba(0,0,0,.3);}
#visualizacao h2{color:var(--p1);font-size:28px;margin:30px 0 15px;padding-bottom:10px;border-bottom:3px solid var(--p1);}
#visualizacao h2+p:first-letter{float:left;font-size:3.8em;line-height:.9;padding-right:12px;font-weight:bold;color:var(--p1);}
#visualizacao p{margin:15px 0;text-align:justify;}
#visualizacao img.media-element{margin:20px 0;max-width:100%;border-radius:10px;box-shadow:0 4px 15px rgba(0,0,0,.1);}
#visualizacao .video-container{position:relative;padding-bottom:56.25%;height:0;margin:20px 0;border-radius:10px;overflow:hidden;}
#visualizacao .video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;}
#visualizacao .dica-destacada{background:linear-gradient(135deg,#eef2ff,#f5f3ff);padding:25px;border-radius:12px;border-left:5px solid var(--p1);font-weight:500;margin:25px 0;}
#visualizacao .dica-destacada::before{content:"💡 Dica: ";font-weight:bold;color:var(--p1);}
#visualizacao .pergunta-direta{margin:25px 0;padding:20px;background:linear-gradient(135deg,#eef2ff,#f5f3ff);border-left:5px solid var(--p2);border-radius:12px;font-weight:600;color:var(--p2);}
#visualizacao .papel-resposta{display:block;width:100%;min-height:150px;padding:15px;font-family:'Georgia',serif;font-size:16px;line-height:32px;border:2px solid var(--border);border-radius:10px;outline:none;background:#fff;resize:vertical;margin:15px 0;}
#visualizacao .quiz-card{margin:25px 0;padding:25px;border-radius:12px;background:#fff;box-shadow:0 4px 15px rgba(0,0,0,.08);border:2px solid var(--border);}
#visualizacao .quiz-header{font-weight:bold;margin-bottom:12px;color:var(--p1);font-size:15px;text-transform:uppercase;}
#visualizacao .quiz-pergunta{font-size:18px;font-weight:600;color:#333;margin-bottom:15px;}
#visualizacao .quiz-enunciado{font-size:16px;color:#555;font-style:italic;margin-bottom:10px;}
#visualizacao .quiz-image{max-width:100%;border-radius:10px;margin:10px 0;}
#visualizacao .option-label{display:block;margin:10px 0;padding:14px;border-radius:10px;border:2px solid var(--border);cursor:pointer;transition:all .2s;}
#visualizacao .option-label:hover{border-color:var(--p1);}
#visualizacao .option-label.correct{background:#dcfce7;border-color:var(--green);}
#visualizacao .option-label.incorrect{background:#fee2e2;border-color:var(--red);}
#visualizacao .quiz-actions{margin-top:16px;display:flex;gap:12px;align-items:center;}
#visualizacao .quiz-result{font-weight:700;font-size:15px;}

/* btn inside visualizacao */
#visualizacao .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;background:var(--grad);color:#fff;}

.builder-btn{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--bg);border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);transition:all .2s;white-space:nowrap;}
.builder-btn:hover{border-color:var(--p1);color:var(--p1);background:#eef2ff;}
.builder-btn .bi{font-size:16px;}

/* ── Grades table ── */
.grades-table{width:100%;border-collapse:collapse;font-size:14px;}
.grades-table th{background:var(--dark);color:rgba(255,255,255,.8);padding:12px 16px;text-align:left;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.grades-table td{padding:12px 16px;border-bottom:1px solid var(--border);}
.grades-table tr:hover td{background:#fafafa;}
.grade-input{width:70px;padding:6px 10px;border:2px solid var(--border);border-radius:8px;font-size:14px;text-align:center;outline:none;}
.grade-input:focus{border-color:var(--p1);}

/* ── Aluno list ── */
.aluno-row{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--border);}
.aluno-avatar{width:40px;height:40px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0;}

/* ── States ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .es-icon{font-size:56px;margin-bottom:16px;}
.empty-state h3{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px;}
.hidden{display:none!important;}
.loading{text-align:center;padding:40px;color:var(--muted);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:9999;animation:toastIn .3s ease;pointer-events:none;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}

/* Popup for builder elements */
.el-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;backdrop-filter:blur(4px);}
.el-overlay.open{display:flex;align-items:center;justify-content:center;}
.el-popup{background:#fff;border-radius:16px;padding:28px;width:90%;max-width:540px;max-height:85vh;overflow-y:auto;}
.el-popup h2{font-family:'Outfit',sans-serif;font-size:20px;font-weight:700;margin-bottom:20px;}
.el-popup label{display:block;font-weight:700;font-size:13px;margin-bottom:6px;margin-top:14px;}
.el-popup input[type=text],.el-popup textarea,.el-popup select{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:9px;font-size:14px;outline:none;}
.el-popup input[type=text]:focus,.el-popup textarea:focus{border-color:var(--p1);}
.el-popup-actions{display:flex;gap:10px;margin-top:20px;}
.el-popup-actions .btn{flex:1;justify-content:center;}
.two-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── Hamburger ── */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;border:none;background:transparent;flex-shrink:0;}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .3s;}
.hamburger.active span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.hamburger.active span:nth-child(2){opacity:0;}
.hamburger.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:499;backdrop-filter:blur(2px);}
.sidebar-backdrop.open{display:block;}

@media(max-width:900px){
  .hamburger{display:flex;}
  .sidebar{position:fixed;left:-280px;top:0;bottom:0;z-index:500;transition:left .3s ease;box-shadow:none;}
  .sidebar.open{left:0;box-shadow:8px 0 32px rgba(0,0,0,.25);}
  .main{width:100%;}
  .content{padding:16px;}
  .cards-grid{grid-template-columns:1fr 1fr;}
  .builder-meta{flex-wrap:wrap;gap:8px;padding:10px 12px;}
  .builder-meta span{display:none;}
  .builder-meta input,.builder-meta select{width:100%!important;flex:1 1 100%;}
  .builder-toolbar{gap:6px;padding:8px 10px;overflow-x:auto;flex-wrap:nowrap;}
  .builder-btn{font-size:12px;padding:7px 10px;flex-shrink:0;}
  .builder-canvas{padding:12px;}
  .builder-editor{padding:20px;}
  .list-item{flex-wrap:wrap;gap:8px;}
  .list-item-actions{width:100%;display:flex;justify-content:flex-end;}
  .topbar{padding:0 16px;}
  .topbar h2{font-size:16px;}
  .grades-table th,.grades-table td{padding:8px 10px;font-size:13px;}
}
@media(max-width:480px){
  .cards-grid{grid-template-columns:1fr;}
  .popup-box{padding:20px 16px;}
  .list-item-actions .btn{font-size:11px;padding:5px 8px;}
  .builder-btn .bi{display:none;}
}
</style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <h1>📚 EduAVA</h1>
    <span>Painel do Professor</span>
  </div>
  <div class="user-card">
    <div class="uname" id="sidebarNome">Carregando...</div>
    <div class="urole">👩‍🏫 Professor(a)</div>
  </div>
  <div class="sidebar-section">Menu</div>
  <div class="nav-item active" onclick="showSection('dashboard')" id="nav-dashboard">
    <span class="nav-icon">🏠</span> Dashboard
  </div>
  <div class="nav-item" onclick="showSection('turmas')" id="nav-turmas">
    <span class="nav-icon">🏫</span> Minhas Turmas
  </div>
  <div class="sidebar-section" id="turmasNavSection" style="display:none">Turmas</div>
  <div id="turmasNavList"></div>
  <div class="sidebar-section">Aula</div>
  <div class="nav-item" onclick="showSection('builder')" id="nav-builder">
    <span class="nav-icon">✏️</span> Criar / Editar Aula
  </div>
  <div class="sidebar-bottom">
    <button class="btn-logout" onclick="logout()">↩ Sair</button>
  </div>
</nav>

<!-- Sidebar backdrop (mobile) -->
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <h2 id="pageTitle">Dashboard</h2>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>
  <div class="content" id="mainContent">
    <div class="loading">Carregando...</div>
  </div>
</div>

<!-- Overlay Criar Turma -->
<div class="overlay" id="overlayTurma">
  <div class="popup-box">
    <h2>🏫 Nova Turma</h2>
    <div class="form-field"><label>Nome da Turma</label><input type="text" id="turmaNome" placeholder="Ex: 9º Ano A — Matemática 2025"></div>
    <div class="popup-actions">
      <button class="btn btn-primary" onclick="criarTurma()">Criar Turma</button>
      <button class="btn btn-ghost" onclick="closeOverlay('overlayTurma')">Cancelar</button>
    </div>
  </div>
</div>

<!-- Overlay Notas -->
<div class="overlay" id="overlayNotas">
  <div class="popup-box" style="max-width:700px">
    <h2>📊 Lançar Notas</h2>
    <div id="notasContent"></div>
    <div class="popup-actions">
      <button class="btn btn-ghost" onclick="closeOverlay('overlayNotas')">Fechar</button>
    </div>
  </div>
</div>

<!-- Overlay Ver Respostas -->
<div class="overlay" id="overlayRespostas">
  <div class="popup-box" style="max-width:780px;width:95%">
    <h2 id="overlayRespostasTitle">📋 Respostas dos Alunos</h2>
    <div id="respostasContent"><div class="loading">Carregando...</div></div>
    <div class="popup-actions" style="margin-top:20px">
      <button class="btn btn-ghost" onclick="closeOverlay('overlayRespostas')">Fechar</button>
    </div>
  </div>
</div>

<!-- Builder Element Popups -->
<div class="el-overlay" id="elOverlay">
  <div class="el-popup" id="elPopupBox"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// CONFIG & STATE
// ═══════════════════════════════════════════════
let API = localStorage.getItem('ava_api') || '';
let user = JSON.parse(localStorage.getItem('ava_user') || 'null');
let turmas = [];
let aulaAtual = null; // {id, titulo, turma_id, materia, file_id}
let turmaAtiva = null;
let aulas = [];
let _pendingTurmaId = null;

async function post(payload) {
  const r = await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
  return r.json();
}
async function get(params) {
  const qs = new URLSearchParams(params).toString();
  const r  = await fetch(API+'?'+qs);
  return r.json();
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

async function loadTurmas() {
  const data = await post({ action:'getTurmas', email: user.email });
  turmas = data.turmas || [];
  renderTurmasNav();
}

function renderTurmasNav() {
  const list = document.getElementById('turmasNavList');
  const sec  = document.getElementById('turmasNavSection');
  if (turmas.length === 0) { list.innerHTML=''; sec.style.display='none'; return; }
  sec.style.display = 'block';
  list.innerHTML = turmas.map(t => `
    <div class="nav-turma-item" onclick="openTurma('${t.id}')" id="navt-${t.id}">${t.nome}</div>
  `).join('');
}

async function criarTurma() {
  const nome = document.getElementById('turmaNome').value.trim();
  if (!nome) { toast('Digite o nome da turma.'); return; }
  const data = await post({ action:'createTurma', nome, professor_email: user.email });
  if (data.error) { toast('Erro: '+data.error); return; }
  toast('✅ Turma criada! Código: '+data.codigo);
  document.getElementById('turmaNome').value = '';
  closeOverlay('overlayTurma');
  await loadTurmas();
  showSection('turmas');
}

async function deletarTurma(id) {
  if (!confirm('Excluir esta turma e todas as aulas? Essa ação não pode ser desfeita.')) return;
  await post({ action:'deleteTurma', id });
  toast('Turma excluída.');
  await loadTurmas();
  showSection('turmas');
}

function openTurma(id) {
  turmaAtiva = turmas.find(t => t.id === id);
  showSection('turmaDetail');
}

// ═══════════════════════════════════════════════
// SECTIONS
// ═══════════════════════════════════════════════
function showSection(section) {
  closeSidebar(); // fecha sidebar no mobile ao navegar
  const content = document.getElementById('mainContent');
  const title   = document.getElementById('pageTitle');
  const actions = document.getElementById('topbarActions');
  actions.innerHTML = '';

  // De-highlight turma nav items
  document.querySelectorAll('.nav-turma-item').forEach(n=>n.classList.remove('active'));

  switch(section) {
    case 'dashboard':
      setActive('dashboard'); title.textContent = 'Dashboard';
      renderDashboard(); break;

    case 'turmas':
      setActive('turmas'); title.textContent = 'Minhas Turmas';
      actions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openOverlay('overlayTurma')">+ Nova Turma</button>`;
      renderTurmas(); break;

    case 'turmaDetail':
      if (!turmaAtiva) { showSection('turmas'); return; }
      const navEl = document.getElementById('navt-'+turmaAtiva.id);
      if (navEl) navEl.classList.add('active');
      title.textContent = turmaAtiva.nome;
      actions.innerHTML = `
        <button class="btn btn-ghost btn-sm" onclick="showNotasModal('${turmaAtiva.id}')">📊 Notas</button>
        <button class="btn btn-danger btn-sm" onclick="deletarTurma('${turmaAtiva.id}')">🗑 Excluir</button>
      `;
      renderTurmaDetail(); break;

    case 'builder':
      setActive('builder'); title.textContent = aulaAtual ? 'Editando: '+aulaAtual.titulo : 'Nova Aula';
      actions.innerHTML = `
        <button class="btn btn-ghost btn-sm" onclick="salvarRascunho()">💾 Salvar Rascunho</button>
        <button class="btn btn-success btn-sm" onclick="publicarAula()">🚀 Publicar</button>
      `;
      renderBuilder(); break;
  }
}

async function showNotasModal(turma_id) {
  openOverlay('overlayNotas');
  document.getElementById('notasContent').innerHTML = '<div class="loading">Carregando...</div>';
  const [alunoData, aulaData, notaData] = await Promise.all([
    post({ action:'getAlunos', turma_id }),
    post({ action:'getAulas', turma_id }),
    post({ action:'getNotas', turma_id })
  ]);
  const alunos = alunoData.alunos||[];
  const aulasL = aulaData.aulas||[];
  const notas  = notaData.notas||[];

  if (!alunos.length || !aulasL.length) {
    document.getElementById('notasContent').innerHTML = '<p style="color:var(--muted)">Sem alunos ou aulas para lançar notas.</p>';
    return;
  }

  function getNota(email, aula_id) {
    const n = notas.find(n=>n.aluno_email.toLowerCase()===email.toLowerCase()&&n.aula_id===aula_id);
    return n ? n.nota : '';
  }

  document.getElementById('notasContent').innerHTML = `
    <div style="overflow-x:auto">
    <table class="grades-table">
      <tr>
        <th>Aluno</th>
        ${aulasL.map(a=>`<th style="max-width:120px">${a.titulo}</th>`).join('')}
      </tr>
      ${alunos.map(al=>`
        <tr>
          <td style="font-weight:700">${al.nome}</td>
          ${aulasL.map(a=>`
            <td>
              <input class="grade-input" type="number" min="0" max="10" step="0.1"
                value="${getNota(al.email, a.id)}"
                onblur="salvarNota('${al.email}','${a.id}','${turma_id}',this.value)">
            </td>
          `).join('')}
        </tr>
      `).join('')}
    </table>
    </div>
    <p style="font-size:13px;color:var(--muted);margin-top:12px">As notas são salvas automaticamente ao sair do campo.</p>
  `;
}

async function salvarNota(email, aula_id, turma_id, valor) {
  if (valor === '') return;
  await post({ action:'saveNota', aluno_email:email, aula_id, turma_id, nota:valor, comentario:'' });
  toast('Nota salva!');
}

function novaAula(turma_id) {
  aulaAtual = null;
  _pendingTurmaId = turma_id || null;
  showSection('builder');
}

async function editarAula(id, file_id, titulo, materia, turma_id) {
  toast('Carregando aula...');
  const data = await post({ action:'getAula', id });
  if (data.error) { toast('Erro: '+data.error); return; }
  aulaAtual = { id, file_id, titulo, materia, turma_id };

  // Abre o builder PRIMEIRO (cria os elementos na página)
  showSection('builder');

  // Agora preenche os campos que já existem
  document.getElementById('builderTitulo').value  = titulo;
  document.getElementById('builderMateria').value = materia;
  document.getElementById('builderTurmaId').value = turma_id;
  document.getElementById('visualizacao').innerHTML = data.aula.html || '';

  // Restaura respostas de quiz salvas localmente
  document.querySelectorAll('#visualizacao .quiz-card').forEach(c => {
    const saved = localStorage.getItem('quiz_answer_'+c.dataset.quizId);
    if (saved) { const r=c.querySelector(`input[value="${saved}"]`); if(r) r.checked=true; }
  });
}

async function deletarAula(id, file_id) {
  if (!confirm('Excluir esta aula?')) return;
  await post({ action:'deleteAula', id, file_id });
  toast('Aula excluída.');
  if (turmaAtiva) renderTurmaDetail();
}

async function salvarRascunho() {
  await saveAulaWithStatus('rascunho');
}

async function publicarAula() {
  await saveAulaWithStatus('publicada');
}

async function saveAulaWithStatus(status) {
  const titulo   = document.getElementById('builderTitulo').value.trim();
  const materia  = document.getElementById('builderMateria').value.trim();
  const turma_id = document.getElementById('builderTurmaId').value;
  if (!titulo)   { toast('Digite o título da aula.'); return; }
  if (!turma_id) { toast('Selecione a turma.'); return; }

  // Get clean HTML (remove contenteditable, toolbar refs)
  const clone = document.getElementById('visualizacao').cloneNode(true);
  const html  = clone.innerHTML;

  const btn = document.querySelector('.btn-success');
  if (btn) { btn.disabled=true; btn.textContent='Salvando...'; }

  const payload = {
    action: 'saveAula', html, titulo, materia, turma_id,
    status, professor_email: user.email
  };
  if (aulaAtual && aulaAtual.id) {
    payload.id      = aulaAtual.id;
    payload.file_id = aulaAtual.file_id;
  }

  const data = await post(payload);
  if (btn) { btn.disabled=false; btn.textContent='🚀 Publicar'; }

  if (data.error) { toast('Erro: '+data.error); return; }
  toast(status==='publicada' ? '✅ Aula publicada!' : '💾 Rascunho salvo!');
  if (!aulaAtual) aulaAtual = { id: data.id, titulo, materia, turma_id };
  else aulaAtual.id = data.id;
  if (turmaAtiva) { await loadTurmas(); }
}

    <label>URL de imagem (opcional):</label><input type="text" id="qImg" placeholder="https://...">
    <label>Pergunta:</label><input type="text" id="qPerg" placeholder="Digite a pergunta">
    <div class="two-cols">
      <div><label>Opção A:</label><input type="text" id="qA" placeholder="Opção A"></div>
      <div><label>Opção B:</label><input type="text" id="qB" placeholder="Opção B"></div>
      <div><label>Opção C:</label><input type="text" id="qC" placeholder="Opção C"></div>
      <div><label>Opção D:</label><input type="text" id="qD" placeholder="Opção D"></div>
    </div>
    <label>Resposta correta:</label>
    <select id="qCorreta"><option value="1">A</option><option value="2">B</option><option value="3">C</option><option value="4">D</option></select>
    <div class="el-popup-actions"><button class="btn btn-primary" onclick="elInsert('quiz')">Inserir Quiz</button><button class="btn btn-ghost" onclick="elClose()">Cancelar</button></div>`,
  embed: `
    <h2>🔗 Embed HTML</h2>
    <label>Código HTML:</label><textarea id="elEmbed" rows="6" placeholder="<iframe ...></iframe>"></textarea>
    <div class="el-popup-actions"><button class="btn btn-primary" onclick="elInsert('embed')">Inserir</button><button class="btn btn-ghost" onclick="elClose()">Cancelar</button></div>`
};

function elOpen(type) {
  const overlay = document.getElementById('elOverlay');
  document.getElementById('elPopupBox').innerHTML = elTemplates[type] || '';
  overlay.classList.add('open');
}
function elClose() { document.getElementById('elOverlay').classList.remove('open'); }
document.getElementById('elOverlay').addEventListener('click', e => { if(e.target===document.getElementById('elOverlay')) elClose(); });

function esc(text) {
  if (!text) return '';
  return String(text).replace(/[&<>"']/g, t => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[t]||t));
}

function escJ(s) { return String(s||'').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

// ═══════════════════════════════════════════════
// VER RESPOSTAS DOS ALUNOS
// ═══════════════════════════════════════════════
async function verRespostas(aula_id, titulo) {
  document.getElementById('overlayRespostasTitle').textContent = '📋 Respostas — ' + titulo;
  document.getElementById('respostasContent').innerHTML = '<div class="loading">Carregando respostas...</div>';
  openOverlay('overlayRespostas');

  // Busca alunos da turma e respostas da aula
  const [alunoData, aulaData] = await Promise.all([
    post({ action:'getAlunos', turma_id: turmaAtiva.id }),
    post({ action:'getAula', id: aula_id })
  ]);

  const alunos   = alunoData.alunos || [];
  const aulaHtml = aulaData.aula?.html || '';

  if (!alunos.length) {
    document.getElementById('respostasContent').innerHTML = '<p style="color:var(--muted)">Nenhum aluno matriculado nesta turma.</p>';
    return;
  }

  // Extrai perguntas dissertativas e quizzes do HTML da aula
  const parser   = new DOMParser();
  const doc      = parser.parseFromString(aulaHtml, 'text/html');
  const perguntas = Array.from(doc.querySelectorAll('.pergunta-direta')).map(el => ({
    texto: el.textContent.trim(),
    chave: el.nextElementSibling?.getAttribute('data-chave') || ''
  })).filter(p => p.chave);
  const quizzes  = Array.from(doc.querySelectorAll('.quiz-card')).map(el => ({
    id:       el.getAttribute('data-quiz-id') || '',
    pergunta: el.querySelector('.quiz-pergunta')?.textContent.trim() || 'Quiz',
    opcoes:   Array.from(el.querySelectorAll('.option-label')).map(o => ({
      texto:   o.querySelector('span')?.textContent.trim() || '',
      correta: !!o.querySelector('[data-correct]')
    }))
  })).filter(q => q.id);

  if (!perguntas.length && !quizzes.length) {
    document.getElementById('respostasContent').innerHTML = '<p style="color:var(--muted)">Esta aula não possui perguntas dissertativas nem quizzes.</p>';
    return;
  }

  // Busca respostas de cada aluno em paralelo
  const respostasMap = {};
  await Promise.all(alunos.map(async al => {
    const r = await post({ action:'getRespostas', aluno_email: al.email, aula_id });
    respostasMap[al.email] = r.respostas || [];
  }));

  // Monta HTML das respostas
  let html = '';

  if (perguntas.length) {
    html += `<h3 style="font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:var(--dark);margin:0 0 14px">✏️ Perguntas Dissertativas</h3>`;
    perguntas.forEach(perg => {
      html += `
        <div style="background:var(--bg);border-radius:12px;padding:18px;margin-bottom:16px;border-left:4px solid var(--p2)">
          <div style="font-weight:700;color:var(--p2);margin-bottom:12px">${esc(perg.texto)}</div>
          ${alunos.map(al => {
            const resp = respostasMap[al.email]?.find(r => r.chave === perg.chave);
            const valor = resp?.valor?.trim();
            return `
              <div style="display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)">
                <div style="width:36px;height:36px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0">${al.nome[0].toUpperCase()}</div>
                <div style="flex:1">
                  <div style="font-weight:700;font-size:13px;color:var(--dark)">${esc(al.nome)}</div>
                  <div style="font-size:14px;color:${valor?'var(--text)':'var(--muted)'};margin-top:4px;line-height:1.5;white-space:pre-wrap">${valor ? esc(valor) : '— Sem resposta'}</div>
                </div>
              </div>`;
          }).join('')}
        </div>`;
    });
  }

  if (quizzes.length) {
    html += `<h3 style="font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:var(--dark);margin:16px 0 14px">📊 Quizzes</h3>`;
    quizzes.forEach(quiz => {
      const respostas = alunos.map(al => {
        const r = respostasMap[al.email]?.find(r => r.chave === 'quiz_answer_'+quiz.id);
        const idx = r ? Number(r.valor) - 1 : -1;
        const opcao  = quiz.opcoes[idx];
        const acerto = opcao?.correta;
        return { al, idx, opcao, acerto };
      });
      const acertos = respostas.filter(r => r.acerto).length;
      const total   = respostas.filter(r => r.idx >= 0).length;

      html += `
        <div style="background:var(--bg);border-radius:12px;padding:18px;margin-bottom:16px;border-left:4px solid var(--p1)">
          <div style="font-weight:700;color:var(--p1);margin-bottom:4px">${esc(quiz.pergunta)}</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:12px">✅ ${acertos} acerto(s) de ${total} resposta(s)</div>
          ${respostas.map(({al, idx, opcao, acerto}) => `
            <div style="display:flex;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
              <div style="width:36px;height:36px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0">${al.nome[0].toUpperCase()}</div>
              <div style="flex:1">
                <div style="font-weight:700;font-size:13px">${esc(al.nome)}</div>
                <div style="font-size:13px;color:var(--muted)">${opcao ? esc(opcao.texto) : '— Sem resposta'}</div>
              </div>
              <span style="font-size:18px">${idx < 0 ? '⬜' : acerto ? '✅' : '❌'}</span>
            </div>
          `).join('')}
        </div>`;
    });
  }

  document.getElementById('respostasContent').innerHTML = html;
}

function viz() { return document.getElementById('visualizacao'); }

function elInsert(type) {
  const v = viz(); if (!v) return;
  let el;
  switch(type) {
    case 'titulo': {
      const t=document.getElementById('elTitulo').value, bg=document.getElementById('elTituloBg').value;
      if(!t){toast('Digite o título');return;}
      el=document.createElement('h1'); el.textContent=t;
      if(bg) el.style.background=`url('${bg}') center/cover no-repeat`;
      break;
    }
    case 'subtitulo': {
      const t=document.getElementById('elSub').value; if(!t){toast('Digite o subtítulo');return;}
      el=document.createElement('h2'); el.textContent=t; break;
    }
    case 'texto': {
      const t=document.getElementById('elTexto').value; if(!t){toast('Digite o texto');return;}
      el=document.createElement('p'); el.textContent=t; break;
    }
    case 'imagem': {
      const u=document.getElementById('elImg').value; if(!u){toast('Digite a URL');return;}
      el=document.createElement('img'); el.src=u; el.className='media-element'; break;
    }
    case 'video': {
      const u=document.getElementById('elVid').value; if(!u){toast('Digite a URL');return;}
      el=document.createElement('div'); el.className='video-container';
      const iframe=document.createElement('iframe');
      let src=u;
      if(u.includes('watch?v=')) src=u.replace('watch?v=','embed/');
      if(u.includes('youtu.be/')) src=u.replace('youtu.be/','www.youtube.com/embed/');
      iframe.src=src; iframe.allowFullscreen=true; el.appendChild(iframe); break;
    }
    case 'dica': {
      const t=document.getElementById('elDica').value; if(!t){toast('Digite a dica');return;}
      el=document.createElement('div'); el.className='dica-destacada'; el.textContent=t; break;
    }
    case 'pergunta': {
      const q=document.getElementById('elPerg').value; if(!q){toast('Digite a pergunta');return;}
      const chave='resposta_'+btoa(q+'_'+Date.now());
      el=document.createElement('div');
      el.innerHTML=`<div class="pergunta-direta">${esc(q)}</div><textarea class="papel-resposta" data-chave="${chave}" placeholder="Digite sua resposta aqui..."></textarea>`;
      const ta=el.querySelector('textarea');
      ta.addEventListener('input',()=>localStorage.setItem(chave,ta.value));
      break;
    }
    case 'quiz': {
      const qid='quiz_'+Date.now();
      const enunc=document.getElementById('qEnunciado').value;
      const imgU=document.getElementById('qImg').value;
      const perg=document.getElementById('qPerg').value;
      const opts=[document.getElementById('qA').value||'Opção A',document.getElementById('qB').value||'Opção B',document.getElementById('qC').value||'Opção C',document.getElementById('qD').value||'Opção D'];
      const correta=document.getElementById('qCorreta').value;
      if(!perg){toast('Digite a pergunta');return;}
      const name=qid+'_name';
      const letters=['A','B','C','D'];
      el=document.createElement('div'); el.className='quiz-card'; el.setAttribute('data-quiz-id',qid);
      el.innerHTML=`
        <div class="quiz-header">📊 Questão de Múltipla Escolha</div>
        ${enunc?`<div class="quiz-enunciado">${esc(enunc)}</div>`:''}
        <div class="quiz-pergunta">${esc(perg)}</div>
        ${imgU?`<img class="quiz-image" src="${esc(imgU)}" alt="Imagem">`:''}
        <div class="quiz-options">
          ${opts.map((o,i)=>`<label class="option-label"><input class="option-input" type="radio" name="${name}" value="${i+1}" ${Number(correta)===i+1?'data-correct="true"':''}><span><strong>${letters[i]})</strong> ${esc(o)}</span></label>`).join('')}
        </div>
        <div class="quiz-actions">
          <button class="btn" onclick="verificarQuiz(this)" data-quiz-id="${qid}">Verificar Resposta</button>
          <div class="quiz-result" data-result-for="${qid}"></div>
        </div>`;
      break;
    }
    case 'embed': {
      const h=document.getElementById('elEmbed').value; if(!h){toast('Digite o HTML');return;}
      el=document.createElement('div'); el.innerHTML=h; break;
    }
  }
  if(el) v.appendChild(el);
  elClose();
}

function verificarQuiz(btn) {
  const qid=btn.getAttribute('data-quiz-id');
  const container=btn.closest('.quiz-card'); if(!container) return;
  const resultBox=container.querySelector(`.quiz-result[data-result-for="${qid}"]`);
  container.querySelectorAll('.option-label').forEach(l=>l.classList.remove('correct','incorrect'));
  const correctR=Array.from(container.querySelectorAll('input[type=radio]')).find(r=>r.hasAttribute('data-correct'));
  const selected=container.querySelector('input[type=radio]:checked');
  if(!selected){if(resultBox){resultBox.textContent='⚠️ Escolha uma opção';resultBox.style.color='#d97706';} return;}
  if(correctR) correctR.closest('.option-label')?.classList.add('correct');
  const selLabel=selected.closest('.option-label');
  if(selLabel&&!selected.hasAttribute('data-correct')) selLabel.classList.add('incorrect');
  if(resultBox){
    const ok=selected.hasAttribute('data-correct');
    resultBox.textContent=ok?'✅ Correto!':'❌ Incorreto';
    resultBox.style.color=ok?'#059669':'#dc2626';
  }
}
window.verificarQuiz = verificarQuiz;

// OVERLAY HELPERS

function openOverlay(id)  { document.getElementById(id).classList.add('open'); }
function closeOverlay(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); });
});
</script>
